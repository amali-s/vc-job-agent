name: Daily Job Scan

on:
  schedule:
    - cron: '0 23 * * *'  # 5:00 PM CST = 11:00 PM UTC
  workflow_dispatch:       # Manual trigger for testing

jobs:
  scan-jobs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Restore agent data cache
        uses: actions/cache@v4
        with:
          path: |
            data/match_history.json
            data/scraped_jobs.json
          key: agent-data-${{ github.run_number }}
          restore-keys: |
            agent-data-

      - name: Decode resume
        if: ${{ secrets.RESUME_PDF_BASE64 != '' }}
        run: |
          mkdir -p data
          echo "${{ secrets.RESUME_PDF_BASE64 }}" | base64 --decode > data/resume.pdf
          echo "Resume decoded ($(wc -c < data/resume.pdf) bytes)"

      - name: Run job scanner
        env:
          # AI matching (Anthropic Claude)
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Email (use Gmail OR SendGrid)
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          # Portfolio (optional — for richer profile matching)
          PORTFOLIO_URL: ${{ secrets.PORTFOLIO_URL }}
          PORTFOLIO_SUBPAGES: ${{ secrets.PORTFOLIO_SUBPAGES }}
        run: python -m src.main
